name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-build.txt

      - name: Enable Windows developer mode when available
        shell: pwsh
        run: |
          try {
            New-ItemProperty `
              -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" `
              -Name "AllowDevelopmentWithoutDevLicense" `
              -PropertyType DWord `
              -Value 1 `
              -Force | Out-Null
          } catch {
            Write-Warning "No se pudo cambiar Developer Mode; se continuará con los permisos del runner."
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt -r requirements-build.txt

      - name: Verify source
        run: |
          python -m compileall -q main.py app_meta.py core config ui tests tools
          python -m pytest -q

      - name: Build native Windows app
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Clean -SkipInstall -SkipTests

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WizZDesktop-windows-x64
          path: |
            dist/release/*.zip
            dist/release/*.sha256
          if-no-files-found: error
          retention-days: 30
